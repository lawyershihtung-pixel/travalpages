
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1a1410;--ink2:#4a3f35;--ink3:#7a6e65;
  --paper:#fdf8f0;--paper2:#f5ede0;--paper3:#eedcc8;
  --red:#c0392b;--gold:#b8860b;--teal:#1a7a6e;
  --border:rgba(26,20,16,0.12);--border2:rgba(26,20,16,0.22);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}

.header{
  background:var(--ink);color:var(--paper);
  padding:2rem 1.5rem 1.5rem;
  position:relative;overflow:hidden;
}
.header::before{
  content:'東京';
  position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  font-family:'Noto Serif TC',serif;font-size:160px;font-weight:600;
  color:rgba(255,255,255,0.04);letter-spacing:-8px;line-height:1;
  pointer-events:none;
}
.header-jp{font-family:'Noto Serif TC',serif;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.45);margin-bottom:6px;text-transform:uppercase}
.header-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:300;letter-spacing:2px;line-height:1.3;color:var(--paper)}
.header-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px;letter-spacing:1px}
.header-stats{display:flex;gap:20px;margin-top:1.2rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1)}
.stat-item{text-align:center}
.stat-num{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:300;color:var(--paper)}
.stat-lbl{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-top:2px}

.day-tabs{display:flex;overflow-x:auto;background:var(--ink);border-top:1px solid rgba(255,255,255,0.08);scrollbar-width:none;padding:0 1rem}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex:0 0 auto;padding:10px 14px;font-size:11px;letter-spacing:0.5px;
  color:rgba(255,255,255,0.35);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Noto Serif TC',serif;
}
.day-tab.active{color:var(--paper);border-bottom-color:rgba(255,255,255,0.5)}
.day-tab:hover{color:rgba(255,255,255,0.7)}

.content{padding:1.2rem}

.day-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;padding-bottom:1rem;
  border-bottom:1px solid var(--border);
}
.day-info{display:flex;align-items:baseline;gap:10px}
.day-num{font-family:'Noto Serif TC',serif;font-size:36px;font-weight:300;color:var(--ink);line-height:1}
.day-meta{display:flex;flex-direction:column}
.day-date{font-size:11px;color:var(--ink3);letter-spacing:1px}
.day-theme{font-size:13px;color:var(--ink2);margin-top:2px;font-family:'Noto Serif TC',serif}
.add-btn{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--ink);color:var(--paper);border:none;cursor:pointer;
  font-size:12px;font-family:'Noto Sans TC',sans-serif;letter-spacing:0.5px;
  border-radius:4px;transition:opacity 0.2s;
}
.add-btn:hover{opacity:0.8}

.entries{display:flex;flex-direction:column;gap:1rem}

.entry-card{
  background:white;border:1px solid var(--border);
  border-radius:6px;overflow:hidden;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.entry-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
  background:var(--paper2);
}
.entry-type{display:flex;align-items:center;gap:7px}
.type-badge{
  display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;font-size:11px;letter-spacing:0.5px;
  font-family:'Noto Serif TC',serif;
}
.type-sight{background:#e8f4f1;color:var(--teal);border:1px solid #b8ddd7}
.type-food{background:#fef3e8;color:#c0562b;border:1px solid #f0c89a}
.type-hotel{background:#eee8f8;color:#5a3a9a;border:1px solid #c5b8e8}
.type-transport{background:#f0f0f0;color:#444;border:1px solid #ccc}
.entry-time{font-size:11px;color:var(--ink3);letter-spacing:0.5px}

.entry-body{padding:12px 14px}
.entry-name{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:400;color:var(--ink);margin-bottom:4px}
.entry-location{font-size:11px;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.entry-note{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:10px}

.stars{display:flex;gap:3px;margin-bottom:10px;align-items:center}
.star{font-size:20px;cursor:pointer;color:#ddd;transition:color 0.15s;line-height:1;user-select:none}
.star.filled{color:#c0892b}
.star:hover{color:#c0892b;transform:scale(1.1)}
.rating-label{font-size:11px;color:var(--ink3);margin-left:6px;font-family:'Noto Serif TC',serif}

.photos-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.photo-thumb{
  width:72px;height:72px;object-fit:cover;
  border-radius:3px;border:1px solid var(--border);cursor:pointer;
}
.add-photo-btn{
  width:72px;height:72px;border:1.5px dashed var(--border2);
  border-radius:3px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;color:var(--ink3);
  font-size:10px;gap:4px;background:transparent;transition:background 0.2s;
}
.add-photo-btn:hover{background:var(--paper2)}
.add-photo-btn i{font-size:22px}

.entry-actions{display:flex;justify-content:flex-end;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--paper)}
.action-btn{
  padding:5px 10px;font-size:11px;border:1px solid var(--border2);
  background:transparent;cursor:pointer;border-radius:3px;
  color:var(--ink2);display:flex;align-items:center;gap:4px;
  font-family:'Noto Sans TC',sans-serif;transition:background 0.15s;
}
.action-btn:hover{background:var(--paper3)}
.action-btn.del{color:var(--red);border-color:rgba(192,57,43,0.3)}
.action-btn.del:hover{background:rgba(192,57,43,0.06)}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;padding:0;
}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--paper);width:100%;max-width:680px;
  border-radius:12px 12px 0 0;padding:1.5rem;
  max-height:90vh;overflow-y:auto;
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--ink);margin-bottom:1.2rem;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink3);line-height:1}

.form-group{margin-bottom:14px}
.form-label{font-size:11px;letter-spacing:1px;color:var(--ink3);margin-bottom:5px;display:block;font-weight:500}
.form-input,.form-select,.form-textarea{
  width:100%;padding:9px 12px;border:1px solid var(--border2);
  background:white;font-size:13px;font-family:'Noto Sans TC',sans-serif;
  color:var(--ink);border-radius:4px;outline:none;
  transition:border-color 0.2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal)}
.form-textarea{resize:vertical;min-height:70px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.star-picker{display:flex;gap:5px;margin-top:5px}
.star-pick{font-size:26px;cursor:pointer;color:#ddd;transition:all 0.15s;line-height:1}
.star-pick.sel,.star-pick.hover{color:#c0892b}

.submit-btn{
  width:100%;padding:11px;background:var(--ink);color:var(--paper);
  border:none;cursor:pointer;font-size:14px;letter-spacing:1px;
  font-family:'Noto Serif TC',serif;border-radius:4px;margin-top:6px;
  transition:opacity 0.2s;
}
.submit-btn:hover{opacity:0.85}

.photo-upload-area{
  border:1.5px dashed var(--border2);border-radius:4px;padding:16px;
  text-align:center;cursor:pointer;transition:background 0.2s;
}
.photo-upload-area:hover{background:var(--paper2)}
.photo-preview-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.preview-thumb{width:60px;height:60px;object-fit:cover;border-radius:3px;border:1px solid var(--border)}

.route-fields{
  display:none;padding:12px;margin-bottom:14px;
  background:#f4f7f6;border:1px solid rgba(26,122,110,0.2);border-radius:5px;
}
.route-fields.active{display:block}
.route-card{
  margin:10px 0;padding:10px 12px;
  background:#f7faf9;border:1px solid rgba(26,122,110,0.18);border-radius:5px;
}
.route-line{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--ink2);line-height:1.55}
.route-line+.route-line{margin-top:5px}
.route-line i{font-size:14px;color:var(--teal);margin-top:2px;flex:0 0 auto}
.route-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.route-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 7px;border-radius:3px;background:white;border:1px solid var(--border);
  font-size:11px;color:var(--ink3);
}
.map-link{
  display:inline-flex;align-items:center;gap:5px;margin-top:9px;
  padding:6px 9px;border-radius:3px;border:1px solid rgba(26,122,110,0.28);
  color:var(--teal);text-decoration:none;font-size:11px;background:white;
}
.map-link:hover{background:#eef7f4}

.empty-day{
  text-align:center;padding:3rem 1rem;color:var(--ink3);
}
.empty-icon{font-size:40px;opacity:0.25;margin-bottom:12px;display:block}
.empty-text{font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:1px;opacity:0.5}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox.hidden{display:none}
.lightbox img{max-width:90%;max-height:90%;object-fit:contain}

.summary-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-bottom:1rem;padding:12px;background:var(--paper2);
  border-radius:5px;border:1px solid var(--border);
}
.sum-item{text-align:center}
.sum-num{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:300;color:var(--ink)}
.sum-lbl{font-size:10px;color:var(--ink3);letter-spacing:0.5px;margin-top:2px}
.expense-card{
  display:flex;align-items:flex-start;gap:8px;
  margin:10px 0;padding:9px 11px;
  background:#fff8ea;border:1px solid #efd7a8;border-radius:5px;
  color:#6b4a16;font-size:12px;line-height:1.55;
}
.expense-card i{font-size:15px;color:var(--gold);margin-top:1px}
.expense-amount{font-family:'Noto Serif TC',serif;font-size:15px;color:#5d3d0d}
.expense-note{font-size:11px;color:#8a6b35;margin-top:2px}
@media(max-width:520px){
  .summary-bar{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-jp">Tokyo Travel Diary · 2026</div>
  <div class="header-title">東京六日旅遊日記</div>
  <div class="header-sub">2026年7月1日 — 7月6日 · 桃園出發</div>
  <div class="header-stats">
    <div class="stat-item"><div class="stat-num" id="totalEntries">0</div><div class="stat-lbl">記錄</div></div>
    <div class="stat-item"><div class="stat-num" id="totalPhotos">0</div><div class="stat-lbl">照片</div></div>
    <div class="stat-item"><div class="stat-num" id="avgRating">—</div><div class="stat-lbl">平均評分</div></div>
    <div class="stat-item"><div class="stat-num" id="daysLogged">0</div><div class="stat-lbl">記錄天數</div></div>
    <div class="stat-item"><div class="stat-num" id="totalExpense">¥0</div><div class="stat-lbl">花費</div></div>
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="content" id="mainContent"></div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">新增記錄</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">類型</label>
      <select class="form-select" id="fType">
        <option value="sight">🏯 景點</option>
        <option value="food">🍜 美食</option>
        <option value="hotel">🏨 住宿</option>
        <option value="transport">🚄 交通</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">名稱</label>
      <input class="form-input" id="fName" placeholder="如：淺草寺、一蘭拉麵…">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">地點（區域）</label>
        <input class="form-input" id="fLocation" placeholder="如：淺草、新宿">
      </div>
      <div class="form-group">
        <label class="form-label">時間</label>
        <input class="form-input" id="fTime" type="time">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">個人評語</label>
      <textarea class="form-textarea" id="fNote" placeholder="記錄你的感受、心得、推薦理由…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">費用金額</label>
        <input class="form-input" id="fExpenseAmount" type="number" min="0" step="1" placeholder="如：1200">
      </div>
      <div class="form-group">
        <label class="form-label">幣別</label>
        <select class="form-select" id="fExpenseCurrency">
          <option value="JPY">日圓 JPY</option>
          <option value="TWD">台幣 TWD</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">費用備註</label>
      <input class="form-input" id="fExpenseNote" placeholder="如：門票、餐費、伴手禮、拍貼照片">
    </div>
    <div class="route-fields" id="routeFields">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">出發地</label>
          <input class="form-input" id="fOrigin" placeholder="如：淺草寺">
        </div>
        <div class="form-group">
          <label class="form-label">目的地</label>
          <input class="form-input" id="fDestination" placeholder="如：東京車站">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">交通方式</label>
          <select class="form-select" id="fTransitMode">
            <option value="transit">電車／大眾運輸</option>
            <option value="walking">步行</option>
            <option value="driving">開車／計程車</option>
            <option value="bicycling">自行車</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">交通時間</label>
          <input class="form-input" id="fDuration" placeholder="如：28 分鐘">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">個人評分</label>
      <div class="star-picker" id="starPicker">
        <span class="star-pick" data-v="1">★</span>
        <span class="star-pick" data-v="2">★</span>
        <span class="star-pick" data-v="3">★</span>
        <span class="star-pick" data-v="4">★</span>
        <span class="star-pick" data-v="5">★</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">上傳照片</label>
      <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
        <i class="ti ti-camera" style="font-size:24px;color:var(--ink3)"></i>
        <p style="font-size:12px;color:var(--ink3);margin-top:6px">點擊上傳照片</p>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      <div class="photo-preview-row" id="previewRow"></div>
    </div>
    <button class="submit-btn" onclick="submitEntry()">儲存記錄 ✦</button>
  </div>
</div>

<div class="lightbox hidden" id="lightbox" onclick="this.classList.add('hidden')">
  <img id="lightboxImg" src="">
</div>

<script>
const DAYS=[
  {date:'7/1',label:'第一天'},
  {date:'7/2',label:'第二天'},
  {date:'7/3',label:'第三天'},
  {date:'7/4',label:'第四天'},
  {date:'7/5',label:'第五天'},
  {date:'7/6',label:'第六天'},
];

const LABELS={sight:'景點',food:'美食',hotel:'住宿',transport:'交通'};
const TYPE_CLASS={sight:'type-sight',food:'type-food',hotel:'type-hotel',transport:'type-transport'};
const RATING_TEXT=['','一般','還行','不錯','很棒！','完美！'];

let data={0:[],1:[],2:[],3:[],4:[],5:[]};
let currentDay=0;
let currentRating=0;
let pendingPhotos=[];
let editingId=null;
let pendingDeleteId=null;

try{const s=localStorage.getItem('tkDiary26');if(s)data=JSON.parse(s)}catch(e){}

function save(){try{localStorage.setItem('tkDiary26',JSON.stringify(data))}catch(e){}}

function renderTabs(){
  const t=document.getElementById('dayTabs');
  t.innerHTML=DAYS.map((d,i)=>`<div class="day-tab ${i===currentDay?'active':''}" onclick="switchDay(${i})">${d.date} ${d.label}</div>`).join('');
}

function switchDay(i){currentDay=i;renderTabs();renderDay()}

function renderDay(){
  const d=DAYS[currentDay];
  const entries=data[currentDay]||[];
  const photos=entries.reduce((s,e)=>s+(e.photos?e.photos.length:0),0);
  const rated=entries.filter(e=>e.rating>0);
  const avg=rated.length?rated.reduce((s,e)=>s+e.rating,0)/rated.length:0;
  const expenses=sumExpenses(entries);

  let html=`<div class="day-header">
    <div class="day-info">
      <div class="day-num">${d.date}</div>
      <div class="day-meta">
        <div class="day-date">2026年7月${d.date.split('/')[1]}日</div>
        <div class="day-theme">${d.label}</div>
      </div>
    </div>
    <button class="add-btn" onclick="openModal()"><i class="ti ti-plus" style="font-size:14px"></i>新增記錄</button>
  </div>`;

  if(entries.length>0){
    html+=`<div class="summary-bar">
      <div class="sum-item"><div class="sum-num">${entries.length}</div><div class="sum-lbl">記錄總數</div></div>
      <div class="sum-item"><div class="sum-num">${photos}</div><div class="sum-lbl">照片張數</div></div>
      <div class="sum-item"><div class="sum-num">${avg>0?avg.toFixed(1)+'★':'—'}</div><div class="sum-lbl">平均評分</div></div>
      <div class="sum-item"><div class="sum-num">${formatExpenseSummary(expenses)}</div><div class="sum-lbl">今日花費</div></div>
    </div>`;
  }

  html+='<div class="entries" id="entriesList">';
  if(entries.length===0){
    html+=`<div class="empty-day">
      <i class="ti ti-torii-gate empty-icon"></i>
      <div class="empty-text">今日尚無記錄，開始記錄你的東京回憶吧</div>
    </div>`;
  } else {
    entries.forEach((e,idx)=>{html+=renderEntry(e,idx)});
  }
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
  updateStats();
}

function renderEntry(e,idx){
  const stars='★'.repeat(e.rating)+'☆'.repeat(5-e.rating);
  const photosHtml=e.photos&&e.photos.length?e.photos.map(p=>`<img class="photo-thumb" src="${p}" onclick="openLightbox('${p}')">`).join(''):'';
  const routeHtml=renderRoute(e);
  const expenseHtml=renderExpense(e);
  return `<div class="entry-card" id="entry-${e.id}">
    <div class="entry-header">
      <div class="entry-type">
        <span class="type-badge ${TYPE_CLASS[e.type]||''}"><i class="ti ti-${typeIcon(e.type)}"></i>${LABELS[e.type]||e.type}</span>
        ${e.location?`<span style="font-size:11px;color:var(--ink3)"><i class="ti ti-map-pin" style="font-size:11px"></i> ${e.location}</span>`:''}
      </div>
      <span class="entry-time">${e.time||''}</span>
    </div>
    <div class="entry-body">
      <div class="entry-name">${e.name||'（未命名）'}</div>
      ${e.rating>0?`<div class="stars"><span style="color:#c0892b;font-size:16px;letter-spacing:1px">${stars}</span><span class="rating-label">${RATING_TEXT[e.rating]||''}</span></div>`:''}
      ${e.note?`<div class="entry-note">${e.note}</div>`:''}
      ${expenseHtml}
      ${routeHtml}
      ${e.photos&&e.photos.length?`<div class="photos-row">${photosHtml}</div>`:''}
    </div>
    <div class="entry-actions">
      <button class="action-btn" onclick="editEntry('${e.id}')"><i class="ti ti-pencil"></i>編輯</button>
      ${pendingDeleteId===e.id
        ?`<button class="action-btn del" onclick="deleteEntry('${e.id}')"><i class="ti ti-check"></i>確認刪除</button>`
        :`<button class="action-btn del" onclick="requestDeleteEntry('${e.id}')"><i class="ti ti-trash"></i>刪除</button>`}
    </div>
  </div>`;
}

function renderExpense(e){
  if(!e.expense||!Number(e.expense.amount))return '';
  const amount=formatExpense(e.expense.amount,e.expense.currency);
  return `<div class="expense-card">
    <i class="ti ti-receipt"></i>
    <div>
      <div><span class="expense-amount">${amount}</span></div>
      ${e.expense.note?`<div class="expense-note">${e.expense.note}</div>`:''}
    </div>
  </div>`;
}

function renderRoute(e){
  if(!e.route||(!e.route.origin&&!e.route.destination&&!e.route.duration))return '';
  const modeLabel={transit:'大眾運輸',walking:'步行',driving:'開車／計程車',bicycling:'自行車'}[e.route.mode]||'交通';
  const mapUrl=googleMapsUrl(e.route.origin,e.route.destination,e.route.mode);
  return `<div class="route-card">
    ${e.route.origin||e.route.destination?`<div class="route-line"><i class="ti ti-route"></i><span>${e.route.origin||'未填出發地'} → ${e.route.destination||'未填目的地'}</span></div>`:''}
    <div class="route-meta">
      <span class="route-chip"><i class="ti ti-train"></i>${modeLabel}</span>
      ${e.route.duration?`<span class="route-chip"><i class="ti ti-clock"></i>${e.route.duration}</span>`:''}
    </div>
    ${mapUrl?`<a class="map-link" href="${mapUrl}" target="_blank" rel="noopener"><i class="ti ti-map-2"></i>開啟 Google Maps 路線</a>`:''}
  </div>`;
}

function googleMapsUrl(origin,destination,mode){
  if(!origin&&!destination)return '';
  const params=new URLSearchParams({api:'1'});
  if(origin)params.set('origin',origin);
  if(destination)params.set('destination',destination);
  if(mode)params.set('travelmode',mode);
  return `https://www.google.com/maps/dir/?${params.toString()}`;
}

function typeIcon(t){
  return {sight:'torii-gate',food:'bowl-chopsticks',hotel:'building',transport:'train'}[t]||'map-pin';
}

function openModal(entry=null){
  editingId=entry?entry.id:null;
  currentRating=entry?Number(entry.rating||0):0;
  pendingPhotos=entry&&entry.photos?[...entry.photos]:[];
  document.getElementById('modalTitle').textContent=entry?'編輯記錄':'新增記錄';
  document.getElementById('fName').value=entry?entry.name||'':'';
  document.getElementById('fLocation').value=entry?entry.location||'':'';
  document.getElementById('fNote').value=entry?entry.note||'':'';
  document.getElementById('fTime').value=entry?entry.time||'':'';
  document.getElementById('fType').value=entry?entry.type||'sight':'sight';
  document.getElementById('fExpenseAmount').value=entry&&entry.expense?entry.expense.amount||'':'';
  document.getElementById('fExpenseCurrency').value=entry&&entry.expense?entry.expense.currency||'JPY':'JPY';
  document.getElementById('fExpenseNote').value=entry&&entry.expense?entry.expense.note||'':'';
  document.getElementById('fOrigin').value=entry&&entry.route?entry.route.origin||'':'';
  document.getElementById('fDestination').value=entry&&entry.route?entry.route.destination||'':'';
  document.getElementById('fTransitMode').value=entry&&entry.route?entry.route.mode||'transit':'transit';
  document.getElementById('fDuration').value=entry&&entry.route?entry.route.duration||'':'';
  renderPhotoPreview();
  updateStarPicker(currentRating);
  toggleRouteFields();
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  editingId=null;
}

function editEntry(id){
  pendingDeleteId=null;
  const entry=(data[currentDay]||[]).find(e=>e.id===id);
  if(entry)openModal(entry);
}

function toggleRouteFields(){
  const isTransport=document.getElementById('fType').value==='transport';
  document.getElementById('routeFields').classList.toggle('active',isTransport);
}

function updateStarPicker(v){
  currentRating=v;
  document.querySelectorAll('.star-pick').forEach(s=>{
    s.classList.toggle('sel',parseInt(s.dataset.v)<=v);
  });
}
document.getElementById('starPicker').addEventListener('click',e=>{
  if(e.target.dataset.v)updateStarPicker(parseInt(e.target.dataset.v));
});
document.getElementById('starPicker').addEventListener('mouseover',e=>{
  if(e.target.dataset.v){
    document.querySelectorAll('.star-pick').forEach(s=>{
      s.classList.toggle('hover',parseInt(s.dataset.v)<=parseInt(e.target.dataset.v));
    });
  }
});
document.getElementById('starPicker').addEventListener('mouseleave',()=>{
  document.querySelectorAll('.star-pick').forEach(s=>s.classList.remove('hover'));
});

function handlePhotos(ev){
  Array.from(ev.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      pendingPhotos.push(e.target.result);
      renderPhotoPreview();
    };r.readAsDataURL(f);
  });
  ev.target.value='';
}

function renderPhotoPreview(){
  const row=document.getElementById('previewRow');
  row.innerHTML='';
  pendingPhotos.forEach((src,idx)=>{
    const img=document.createElement('img');
    img.src=src;img.className='preview-thumb';img.title='點擊移除照片';
    img.onclick=()=>{pendingPhotos.splice(idx,1);renderPhotoPreview()};
    row.appendChild(img);
  });
}

function submitEntry(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('請輸入名稱');return}
  const expenseAmount=Number(document.getElementById('fExpenseAmount').value||0);
  const route={
    origin:document.getElementById('fOrigin').value.trim(),
    destination:document.getElementById('fDestination').value.trim(),
    mode:document.getElementById('fTransitMode').value,
    duration:document.getElementById('fDuration').value.trim()
  };
  const existing=editingId?(data[currentDay]||[]).find(e=>e.id===editingId):null;
  const entry={
    id:existing?existing.id:'e'+Date.now(),
    type:document.getElementById('fType').value,
    name,
    location:document.getElementById('fLocation').value.trim(),
    time:document.getElementById('fTime').value,
    note:document.getElementById('fNote').value.trim(),
    rating:currentRating,
    photos:[...pendingPhotos],
    expense:expenseAmount>0?{
      amount:expenseAmount,
      currency:document.getElementById('fExpenseCurrency').value,
      note:document.getElementById('fExpenseNote').value.trim()
    }:null,
    route:document.getElementById('fType').value==='transport'?route:null,
    ts:existing?existing.ts:Date.now(),
    editedTs:existing?Date.now():undefined
  };
  if(existing){
    const idx=data[currentDay].findIndex(e=>e.id===editingId);
    data[currentDay][idx]=entry;
  }else{
    data[currentDay].push(entry);
  }
  save();closeModal();renderDay();
}

function deleteEntry(id){
  data[currentDay]=data[currentDay].filter(e=>e.id!==id);
  pendingDeleteId=null;
  save();renderDay();
}

function requestDeleteEntry(id){
  pendingDeleteId=pendingDeleteId===id?null:id;
  renderDay();
}

function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.remove('hidden');
}

function updateStats(){
  let total=0,photos=0,ratingSum=0,ratingCount=0,daysLogged=0;
  const allExpenses={JPY:0,TWD:0};
  Object.values(data).forEach(entries=>{
    if(entries.length)daysLogged++;
    entries.forEach(e=>{
      total++;
      if(e.photos)photos+=e.photos.length;
      if(e.rating){ratingSum+=e.rating;ratingCount++;}
      addExpense(allExpenses,e.expense);
    });
  });
  document.getElementById('totalEntries').textContent=total;
  document.getElementById('totalPhotos').textContent=photos;
  document.getElementById('avgRating').textContent=ratingCount?(ratingSum/ratingCount).toFixed(1)+'★':'—';
  document.getElementById('daysLogged').textContent=daysLogged;
  document.getElementById('totalExpense').textContent=formatExpenseSummary(allExpenses);
}

function addExpense(target,expense){
  if(!expense||!Number(expense.amount))return;
  const currency=expense.currency||'JPY';
  target[currency]=(target[currency]||0)+Number(expense.amount);
}

function sumExpenses(entries){
  const totals={JPY:0,TWD:0};
  entries.forEach(e=>addExpense(totals,e.expense));
  return totals;
}

function formatExpense(amount,currency){
  const n=Number(amount)||0;
  if(currency==='TWD')return `NT$${n.toLocaleString('zh-TW')}`;
  return `¥${n.toLocaleString('ja-JP')}`;
}

function formatExpenseSummary(totals){
  const parts=[];
  if(totals.JPY)parts.push(formatExpense(totals.JPY,'JPY'));
  if(totals.TWD)parts.push(formatExpense(totals.TWD,'TWD'));
  return parts.length?parts.join(' / '):'¥0';
}

document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay'))closeModal();
});
document.getElementById('fType').addEventListener('change',toggleRouteFields);

renderTabs();renderDay();
</script>
</body>
</html>
