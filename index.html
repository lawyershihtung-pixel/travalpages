<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>東京六日旅遊日記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--ink:#1a1410;--ink2:#4a3f35;--ink3:#776a60;--paper:#fdf8f0;--paper2:#f5ede0;--line:rgba(26,20,16,.14);--red:#b7352a;--teal:#19776c;--gold:#9b6b10}body{font-family:"Noto Sans TC",sans-serif;background:var(--paper);color:var(--ink)}button,input,select,textarea{font:inherit}.header{background:var(--ink);color:var(--paper);padding:28px 20px 18px;position:relative;overflow:hidden}.header:after{content:"東京";position:absolute;right:-18px;top:50%;transform:translateY(-50%);font-family:"Noto Serif TC",serif;font-size:150px;color:rgba(255,255,255,.05);letter-spacing:-8px}.eyebrow{font:11px "Noto Serif TC",serif;letter-spacing:4px;color:rgba(255,255,255,.45);text-transform:uppercase}.title{font:300 26px "Noto Serif TC",serif;letter-spacing:2px;margin-top:5px}.sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:7px}.stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}.stat{text-align:center}.stat b{display:block;font:300 21px "Noto Serif TC",serif}.stat span{font-size:10px;color:rgba(255,255,255,.42);letter-spacing:1px}.toolbar{display:flex;gap:8px;overflow:auto;background:#2b221c;padding:10px 14px}.tool,.add,.submit,.act{border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--paper);border-radius:4px;padding:8px 11px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;font-size:12px}.tabs{display:flex;overflow:auto;background:var(--ink);padding:0 12px}.tab{flex:0 0 auto;color:rgba(255,255,255,.38);padding:10px 14px;border-bottom:2px solid transparent;font:12px "Noto Serif TC",serif;cursor:pointer}.tab.active{color:var(--paper);border-color:rgba(255,255,255,.55)}main{padding:18px}.dayhead{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:15px;margin-bottom:15px}.daynum{font:300 36px "Noto Serif TC",serif}.daydate{font-size:11px;color:var(--ink3);letter-spacing:1px}.daylabel{font:13px "Noto Serif TC",serif;color:var(--ink2)}.add{background:var(--ink);border-color:var(--ink)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:14px}.sum{text-align:center}.sum b{font:300 20px "Noto Serif TC",serif}.sum span{display:block;font-size:10px;color:var(--ink3)}.list{display:flex;flex-direction:column;gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:6px;overflow:hidden}.cardtop{display:flex;justify-content:space-between;gap:10px;align-items:center;background:var(--paper2);border-bottom:1px solid var(--line);padding:12px 14px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:3px;padding:3px 8px;font:11px "Noto Serif TC",serif}.sight{background:#e8f4f1;color:var(--teal);border:1px solid #b8ddd7}.food{background:#fff1e3;color:#bf552a;border:1px solid #edc99d}.hotel{background:#efe9fb;color:#5b3b95;border:1px solid #c9b8ec}.transport{background:#eee;color:#444;border:1px solid #ccc}.time{font-size:11px;color:var(--ink3)}.body{padding:13px 14px}.name{font:16px "Noto Serif TC",serif;margin-bottom:6px}.note{font-size:13px;color:var(--ink2);line-height:1.7;margin:8px 0}.stars{color:#bf8427;font-size:16px;letter-spacing:1px;margin:6px 0}.photo{width:72px;height:72px;object-fit:cover;border-radius:4px;border:1px solid var(--line);cursor:pointer}.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.expense,.route{margin:10px 0;padding:10px 12px;border-radius:5px;font-size:12px;line-height:1.6}.expense{background:#fff8ea;border:1px solid #efd7a8;color:#684716}.route{background:#f6fbfa;border:1px solid rgba(25,119,108,.2);color:var(--ink2)}.route a{display:inline-flex;margin-top:8px;color:var(--teal);text-decoration:none}.actions{display:flex;justify-content:flex-end;gap:8px;background:var(--paper);border-top:1px solid var(--line);padding:8px 14px}.act{color:var(--ink2);border-color:rgba(26,20,16,.25);padding:6px 10px}.act.del{color:var(--red);border-color:rgba(183,53,42,.35)}.empty{text-align:center;color:var(--ink3);padding:52px 10px}.modalwrap{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:10}.hidden{display:none}.modal{width:100%;max-width:720px;background:var(--paper);border-radius:12px 12px 0 0;max-height:90vh;overflow:auto;padding:22px}.mtitle{display:flex;justify-content:space-between;align-items:center;font:18px "Noto Serif TC",serif;margin-bottom:16px}.x{border:0;background:none;font-size:24px;color:var(--ink3)}.group{margin-bottom:13px}.label{display:block;font-size:11px;color:var(--ink3);letter-spacing:1px;margin-bottom:5px}.input,.select,.textarea{width:100%;border:1px solid rgba(26,20,16,.24);background:#fff;border-radius:4px;padding:9px 11px;color:var(--ink)}.textarea{min-height:76px;resize:vertical;line-height:1.6}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pick{font-size:26px;color:#ddd;cursor:pointer}.pick.sel,.pick.hover{color:#bf8427}.upload{border:1.5px dashed rgba(26,20,16,.25);padding:16px;text-align:center;border-radius:4px;cursor:pointer;color:var(--ink3)}.preview{width:62px;height:62px;object-fit:cover;border:1px solid var(--line);border-radius:4px;cursor:pointer}.routefields{display:none;background:#f6fbfa;border:1px solid rgba(25,119,108,.2);border-radius:5px;padding:12px;margin-bottom:13px}.routefields.active{display:block}.submit{width:100%;justify-content:center;background:var(--ink);border-color:var(--ink);font:14px "Noto Serif TC",serif;margin-top:6px}.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:20;display:flex;align-items:center;justify-content:center}.lightbox img{max-width:92%;max-height:92%;object-fit:contain}.status{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:12px}@media(max-width:560px){.row,.summary{grid-template-columns:1fr 1fr}.stats{gap:12px}.stat b{font-size:18px}}@media print{.toolbar,.tabs,.add,.actions,.modalwrap,.lightbox{display:none!important}body{background:#fff}.header{background:#fff;color:#111;border-bottom:1px solid #ddd;padding:16px 0}.header:after{display:none}.sub,.eyebrow,.stat span{color:#555}.stat b{color:#111}main{padding:0}.card{break-inside:avoid;border-color:#ddd}.cardtop{background:#f6f3ee}}
</style>
</head>
<body>
<header class="header">
  <div class="eyebrow">Tokyo Travel Diary · 2026</div>
  <h1 class="title">東京六日旅遊日記</h1>
  <div class="sub">2026年7月1日 — 7月6日 · 桃園出發</div>
  <div class="stats">
    <div class="stat"><b id="totalEntries">0</b><span>記錄</span></div>
    <div class="stat"><b id="totalPhotos">0</b><span>照片</span></div>
    <div class="stat"><b id="avgRating">—</b><span>平均評分</span></div>
    <div class="stat"><b id="daysLogged">0</b><span>記錄天數</span></div>
    <div class="stat"><b id="totalExpense">¥0</b><span>花費</span></div>
  </div>
</header>
<nav class="toolbar">
  <button class="tool" onclick="exportPdf()"><i class="ti ti-file-type-pdf"></i>匯出 PDF</button>
  <button class="tool" onclick="openSync()"><i class="ti ti-brand-google"></i>Google Sheets</button>
  <button class="tool" onclick="syncToSheets()"><i class="ti ti-cloud-up"></i>上傳同步</button>
  <button class="tool" onclick="loadFromSheets()"><i class="ti ti-cloud-down"></i>下載同步</button>
</nav>
<nav class="tabs" id="tabs"></nav>
<main id="main"></main>

<div class="modalwrap hidden" id="entryModal">
  <section class="modal">
    <div class="mtitle"><span id="modalTitle">新增記錄</span><button class="x" onclick="closeEntry()">×</button></div>
    <div class="group"><label class="label">類型</label><select class="select" id="fType"><option value="sight">景點</option><option value="food">美食</option><option value="hotel">住宿</option><option value="transport">交通</option></select></div>
    <div class="group"><label class="label">名稱</label><input class="input" id="fName" placeholder="如：淺草寺、一蘭拉麵"></div>
    <div class="row"><div class="group"><label class="label">地點（區域）</label><input class="input" id="fLocation"></div><div class="group"><label class="label">時間</label><input class="input" id="fTime" type="time"></div></div>
    <div class="group"><label class="label">個人評語</label><textarea class="textarea" id="fNote"></textarea></div>
    <div class="row"><div class="group"><label class="label">費用金額</label><input class="input" id="fExpenseAmount" type="number" min="0" step="1"></div><div class="group"><label class="label">幣別</label><select class="select" id="fExpenseCurrency"><option value="JPY">日圓 JPY</option><option value="TWD">台幣 TWD</option></select></div></div>
    <div class="group"><label class="label">費用備註</label><input class="input" id="fExpenseNote" placeholder="門票、餐費、伴手禮、拍貼照片"></div>
    <div class="routefields" id="routeFields">
      <div class="row"><div class="group"><label class="label">出發地</label><input class="input" id="fOrigin"></div><div class="group"><label class="label">目的地</label><input class="input" id="fDestination"></div></div>
      <div class="row"><div class="group"><label class="label">交通方式</label><select class="select" id="fTransitMode"><option value="transit">電車／大眾運輸</option><option value="walking">步行</option><option value="driving">開車／計程車</option><option value="bicycling">自行車</option></select></div><div class="group"><label class="label">交通時間</label><input class="input" id="fDuration" placeholder="如：28 分鐘"></div></div>
    </div>
    <div class="group"><label class="label">個人評分</label><div id="stars"><span class="pick" data-v="1">★</span><span class="pick" data-v="2">★</span><span class="pick" data-v="3">★</span><span class="pick" data-v="4">★</span><span class="pick" data-v="5">★</span></div></div>
    <div class="group"><label class="label">上傳照片</label><div class="upload" onclick="photoInput.click()"><i class="ti ti-camera" style="font-size:24px"></i><div>點擊上傳照片</div></div><input id="photoInput" type="file" accept="image/*" multiple hidden onchange="handlePhotos(event)"><div class="photos" id="preview"></div></div>
    <button class="submit" onclick="submitEntry()">儲存記錄 ✦</button>
  </section>
</div>

<div class="modalwrap hidden" id="syncModal">
  <section class="modal">
    <div class="mtitle"><span>Google Sheets 同步設定</span><button class="x" onclick="closeSync()">×</button></div>
    <div class="status" id="syncStatus">貼上 Google Apps Script 部署後的 Web App URL，即可同步資料。</div>
    <div class="group"><label class="label">Apps Script Web App URL</label><input class="input" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <button class="submit" onclick="saveSheetUrl()">儲存同步網址</button>
    <button class="submit" onclick="syncToSheets()">上傳目前資料到 Sheets</button>
    <button class="submit" onclick="loadFromSheets()">從 Sheets 下載資料</button>
  </section>
</div>

<div class="lightbox hidden" id="lightbox" onclick="this.classList.add('hidden')"><img id="lightboxImg"></div>

<script>
const DAYS=[{date:'7/1',label:'第一天'},{date:'7/2',label:'第二天'},{date:'7/3',label:'第三天'},{date:'7/4',label:'第四天'},{date:'7/5',label:'第五天'},{date:'7/6',label:'第六天'}];
const LABELS={sight:'景點',food:'美食',hotel:'住宿',transport:'交通'},TYPE={sight:'sight',food:'food',hotel:'hotel',transport:'transport'},RATE=['','一般','還行','不錯','很棒！','完美！'];
let data={0:[],1:[],2:[],3:[],4:[],5:[]},currentDay=0,currentRating=0,pendingPhotos=[],editingId=null,pendingDeleteId=null,sheetUrl=localStorage.getItem('tkDiary26SheetUrl')||'';
try{const saved=localStorage.getItem('tkDiary26');if(saved)data=JSON.parse(saved)}catch(e){}
function save(){localStorage.setItem('tkDiary26',JSON.stringify(data))}
function tabs(){tabsEl().innerHTML=DAYS.map((d,i)=>`<button class="tab ${i===currentDay?'active':''}" onclick="switchDay(${i})">${d.date} ${d.label}</button>`).join('')}
function tabsEl(){return document.getElementById('tabs')}
function switchDay(i){currentDay=i;pendingDeleteId=null;tabs();render()}
function render(){
 const d=DAYS[currentDay],entries=data[currentDay]||[],photos=entries.reduce((s,e)=>s+(e.photos?.length||0),0),rated=entries.filter(e=>e.rating>0),avg=rated.length?rated.reduce((s,e)=>s+e.rating,0)/rated.length:0,exp=sumExpenses(entries);
 let html=`<div class="dayhead"><div class="dayinfo"><div class="daynum">${d.date}</div><div class="daydate">2026年7月${d.date.split('/')[1]}日</div><div class="daylabel">${d.label}</div></div><button class="add" onclick="openEntry()"><i class="ti ti-plus"></i>新增記錄</button></div>`;
 if(entries.length)html+=`<div class="summary"><div class="sum"><b>${entries.length}</b><span>記錄總數</span></div><div class="sum"><b>${photos}</b><span>照片張數</span></div><div class="sum"><b>${avg?avg.toFixed(1)+'★':'—'}</b><span>平均評分</span></div><div class="sum"><b>${expenseSummary(exp)}</b><span>今日花費</span></div></div>`;
 html+=`<div class="list">${entries.length?entries.map(card).join(''):`<div class="empty"><i class="ti ti-torii-gate empty-icon"></i><div>今日尚無記錄，開始記錄你的東京回憶吧</div></div>`}</div>`;
 main.innerHTML=html;stats();
}
function card(e){
 const stars='★'.repeat(e.rating||0)+'☆'.repeat(5-(e.rating||0)),photos=(e.photos||[]).map(p=>`<img class="photo" src="${p}" onclick="openLightbox('${p}')">`).join('');
 return `<article class="card"><div class="cardtop"><div><span class="badge ${TYPE[e.type]||''}"><i class="ti ti-${icon(e.type)}"></i>${LABELS[e.type]||e.type}</span>${e.location?` <span class="time"><i class="ti ti-map-pin"></i> ${e.location}</span>`:''}</div><span class="time">${e.time||''}</span></div><div class="body"><div class="name">${e.name||'（未命名）'}</div>${e.rating?`<div class="stars">${stars} <span class="time">${RATE[e.rating]}</span></div>`:''}${e.note?`<div class="note">${e.note}</div>`:''}${expenseHtml(e)}${routeHtml(e)}${photos?`<div class="photos">${photos}</div>`:''}</div><div class="actions"><button class="act" onclick="editEntry('${e.id}')"><i class="ti ti-pencil"></i>編輯</button>${pendingDeleteId===e.id?`<button class="act del" onclick="deleteEntry('${e.id}')"><i class="ti ti-check"></i>確認刪除</button>`:`<button class="act del" onclick="requestDelete('${e.id}')"><i class="ti ti-trash"></i>刪除</button>`}</div></article>`;
}
function icon(t){return {sight:'torii-gate',food:'bowl-chopsticks',hotel:'building',transport:'train'}[t]||'map-pin'}
function expenseHtml(e){return e.expense&&Number(e.expense.amount)?`<div class="expense"><i class="ti ti-receipt"></i> <b>${money(e.expense.amount,e.expense.currency)}</b>${e.expense.note?`<div>${e.expense.note}</div>`:''}</div>`:''}
function routeHtml(e){if(!e.route||(!e.route.origin&&!e.route.destination&&!e.route.duration))return '';const label={transit:'大眾運輸',walking:'步行',driving:'開車／計程車',bicycling:'自行車'}[e.route.mode]||'交通',url=mapUrl(e.route);return `<div class="route"><div><i class="ti ti-route"></i> ${e.route.origin||'未填出發地'} → ${e.route.destination||'未填目的地'}</div><div>${label}${e.route.duration?' · '+e.route.duration:''}</div>${url?`<a href="${url}" target="_blank" rel="noopener"><i class="ti ti-map-2"></i>開啟 Google Maps 路線</a>`:''}</div>`}
function mapUrl(r){if(!r.origin&&!r.destination)return '';const p=new URLSearchParams({api:'1'});if(r.origin)p.set('origin',r.origin);if(r.destination)p.set('destination',r.destination);if(r.mode)p.set('travelmode',r.mode);return `https://www.google.com/maps/dir/?${p}`}
function openEntry(entry=null){
 editingId=entry?.id||null;currentRating=Number(entry?.rating||0);pendingPhotos=[...(entry?.photos||[])];modalTitle.textContent=entry?'編輯記錄':'新增記錄';
 fType.value=entry?.type||'sight';fName.value=entry?.name||'';fLocation.value=entry?.location||'';fTime.value=entry?.time||'';fNote.value=entry?.note||'';
 fExpenseAmount.value=entry?.expense?.amount||'';fExpenseCurrency.value=entry?.expense?.currency||'JPY';fExpenseNote.value=entry?.expense?.note||'';
 fOrigin.value=entry?.route?.origin||'';fDestination.value=entry?.route?.destination||'';fTransitMode.value=entry?.route?.mode||'transit';fDuration.value=entry?.route?.duration||'';
 previewPhotos();markStars();toggleRoute();entryModal.classList.remove('hidden');
}
function closeEntry(){entryModal.classList.add('hidden');editingId=null}
function editEntry(id){pendingDeleteId=null;const e=(data[currentDay]||[]).find(x=>x.id===id);if(e)openEntry(e)}
function toggleRoute(){routeFields.classList.toggle('active',fType.value==='transport')}
function markStars(){document.querySelectorAll('.pick').forEach(s=>s.classList.toggle('sel',Number(s.dataset.v)<=currentRating))}
stars.addEventListener('click',e=>{if(e.target.dataset.v){currentRating=Number(e.target.dataset.v);markStars()}});
stars.addEventListener('mouseover',e=>{if(e.target.dataset.v)document.querySelectorAll('.pick').forEach(s=>s.classList.toggle('hover',Number(s.dataset.v)<=Number(e.target.dataset.v)))});
stars.addEventListener('mouseleave',()=>document.querySelectorAll('.pick').forEach(s=>s.classList.remove('hover')));
fType.addEventListener('change',toggleRoute);
function handlePhotos(ev){[...ev.target.files].forEach(f=>{const r=new FileReader();r.onload=e=>{pendingPhotos.push(e.target.result);previewPhotos()};r.readAsDataURL(f)});ev.target.value=''}
function previewPhotos(){preview.innerHTML='';pendingPhotos.forEach((src,i)=>{const img=document.createElement('img');img.src=src;img.className='preview';img.title='點擊移除照片';img.onclick=()=>{pendingPhotos.splice(i,1);previewPhotos()};preview.appendChild(img)})}
function submitEntry(){
 const name=fName.value.trim();if(!name){alert('請輸入名稱');return}
 const amount=Number(fExpenseAmount.value||0),existing=editingId?(data[currentDay]||[]).find(e=>e.id===editingId):null;
 const entry={id:existing?existing.id:'e'+Date.now(),type:fType.value,name,location:fLocation.value.trim(),time:fTime.value,note:fNote.value.trim(),rating:currentRating,photos:[...pendingPhotos],expense:amount>0?{amount,currency:fExpenseCurrency.value,note:fExpenseNote.value.trim()}:null,route:fType.value==='transport'?{origin:fOrigin.value.trim(),destination:fDestination.value.trim(),mode:fTransitMode.value,duration:fDuration.value.trim()}:null,ts:existing?existing.ts:Date.now(),editedTs:existing?Date.now():undefined};
 if(existing)data[currentDay][data[currentDay].findIndex(e=>e.id===editingId)]=entry;else data[currentDay].push(entry);
 pendingDeleteId=null;save();closeEntry();render();
}
function requestDelete(id){pendingDeleteId=pendingDeleteId===id?null:id;render()}
function deleteEntry(id){data[currentDay]=data[currentDay].filter(e=>e.id!==id);pendingDeleteId=null;save();render()}
function openLightbox(src){lightboxImg.src=src;lightbox.classList.remove('hidden')}
function stats(){let total=0,photos=0,rs=0,rc=0,days=0,exp={JPY:0,TWD:0};Object.values(data).forEach(list=>{if(list.length)days++;list.forEach(e=>{total++;photos+=e.photos?.length||0;if(e.rating){rs+=e.rating;rc++}addExpense(exp,e.expense)})});totalEntries.textContent=total;totalPhotos.textContent=photos;avgRating.textContent=rc?(rs/rc).toFixed(1)+'★':'—';daysLogged.textContent=days;totalExpense.textContent=expenseSummary(exp)}
function addExpense(t,e){if(e&&Number(e.amount)){const c=e.currency||'JPY';t[c]=(t[c]||0)+Number(e.amount)}}
function sumExpenses(list){const t={JPY:0,TWD:0};list.forEach(e=>addExpense(t,e.expense));return t}
function money(n,c){return c==='TWD'?`NT$${Number(n).toLocaleString('zh-TW')}`:`¥${Number(n).toLocaleString('ja-JP')}`}
function expenseSummary(t){const a=[];if(t.JPY)a.push(money(t.JPY,'JPY'));if(t.TWD)a.push(money(t.TWD,'TWD'));return a.join(' / ')||'¥0'}
function exportPdf(){window.print()}
function openSync(){sheetUrlInput().value=sheetUrl;setStatus('貼上 Google Apps Script 部署後的 Web App URL，即可同步資料。');syncModal.classList.remove('hidden')}
function closeSync(){syncModal.classList.add('hidden')}
function sheetUrlInput(){return document.getElementById('sheetUrl')}
function setStatus(t){syncStatus.textContent=t}
function saveSheetUrl(){sheetUrl=sheetUrlInput().value.trim();localStorage.setItem('tkDiary26SheetUrl',sheetUrl);setStatus(sheetUrl?'同步網址已儲存。':'同步網址已清除。')}
function needUrl(){if(!sheetUrl)sheetUrl=localStorage.getItem('tkDiary26SheetUrl')||'';if(!sheetUrl){openSync();setStatus('請先貼上 Apps Script Web App URL。');return ''}return sheetUrl}
function payload(){return {version:1,updatedAt:new Date().toISOString(),days:DAYS,data}}
async function syncToSheets(){const url=needUrl();if(!url)return;setStatus('正在上傳資料到 Google Sheets...');try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',payload:payload()})});setStatus(await r.text()||'上傳完成。')}catch(e){setStatus('上傳失敗。請確認 Apps Script URL 已部署為任何人皆可存取。')}}
async function loadFromSheets(){const url=needUrl();if(!url)return;setStatus('正在從 Google Sheets 下載資料...');try{const r=await fetch(url+'?action=load&ts='+Date.now()),j=await r.json(),p=j.payload||j;if(p&&p.data){data=p.data;save();tabs();render();setStatus('已從 Google Sheets 下載並更新畫面。')}else setStatus('Sheets 裡沒有可匯入的日記資料。')}catch(e){setStatus('下載失敗。請確認 Apps Script URL 與部署權限。')}}
entryModal.addEventListener('click',e=>{if(e.target===entryModal)closeEntry()});syncModal.addEventListener('click',e=>{if(e.target===syncModal)closeSync()});
tabs();render();
</script>
</body>
</html>
